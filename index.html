<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />

  <title>Twin Work - 트윈타워 스마트 워크</title>

  <!-- 파비콘 (브라우저 탭) -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="assets/icons/favicon.ico" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- black-translucent: 콘텐츠가 노치/상태바 밑까지 확장 (헤더가 safe-area 패딩으로 보정) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Twin Work" />
  <!-- iOS 홈 화면 아이콘 (iOS는 manifest 아이콘을 무시하므로 필수, 180x180 권장) -->
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

  <!-- ⚡ 원격 서버 미리 연결(TLS 핸드셰이크 선처리) — 폰트 CDN / 날씨·공지 프록시(GAS) / 푸시 SDK -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://script.google.com" />
  <link rel="preconnect" href="https://script.googleusercontent.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />

  <!-- 폰트: Pretendard — 렌더링을 막지 않도록 비동기 로드 (로드 전엔 시스템 폰트로 먼저 표시) -->
  <link rel="stylesheet" crossorigin media="print" onload="this.media='all'"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <noscript>
    <link rel="stylesheet" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  </noscript>

  <!-- 디자인 -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ⚡ Lucide Icons (셀프호스팅 — CDN 장애/오프라인에도 안전)
       defer: 396KB 파싱이 첫 화면 그리기를 막지 않도록 비동기화.
       app.js 는 DOMContentLoaded 에서 실행되므로(=defer 스크립트 완료 후) 순서 안전. -->
  <script src="assets/vendor/lucide.min.js" defer></script>
</head>

<body>
  <!-- 배경 블러 블롭 (입체감) -->
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob--1"></span>
    <span class="blob blob--2"></span>
    <span class="blob blob--3"></span>
    <span class="blob blob--4"></span>
  </div>

  <div class="app-shell">

    <!-- ============ A. 데스크톱 좌측 사이드바 ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <img class="sidebar__logo" id="sidebarLogo" alt="logo" />
        <span class="sidebar__title" id="sidebarTitle">Twin Work</span>
      </div>
      <nav class="sidebar__nav" id="sidebarNav"><!-- app.js 주입 --></nav>
    </aside>

    <!-- ============ B. 메인 콘텐츠 ============ -->
    <main class="main" id="main">

      <!-- 상단 고정 헤더 (모바일) -->
      <header class="app-header" id="appHeader">
        <div class="app-header__left">
          <img class="app-header__logo" id="headerLogo" alt="logo" />
          <span class="app-header__name" id="headerName">Twin Work</span>
        </div>
        <div class="app-header__right">
          <button class="icon-btn" id="btnBell" type="button" aria-label="알림">
            <i data-lucide="bell"></i>
          </button>
          <button class="icon-btn" id="btnGrid" type="button" aria-label="전체메뉴">
            <i data-lucide="layout-grid"></i>
          </button>
        </div>
      </header>

      <!-- ===== 홈 대시보드 ===== -->
      <div class="page" id="homePage">

        <!-- [상단] 한 줄 인사말 -->
        <section class="greet">
          <h1 class="greet__line" id="greetLine">환영합니다.</h1>
        </section>

        <!-- [최우선] 기상 특보 배너 (특보 감지 시 동적 활성화) -->
        <section class="alert-wrap">
          <div class="alert-banner is-off" id="alertBanner"><!-- app.js 주입 --></div>
        </section>

        <!-- [중단] 날씨 | 공지 (데스크톱 5:5 / 모바일 세로 스택) -->
        <section class="dash-grid">
          <!-- 날씨 카드 (3대 탭 / 고정 높이) -->
          <div class="widget wx-card">
            <div class="wx-card__head">
              <span class="wx-card__loc"><i data-lucide="map-pin"></i> LG트윈타워
                <span class="wx-sample" id="wxSampleTag" hidden>샘플</span>
              </span>
              <div class="wx-tabs" id="wxTabs">
                <button class="wx-tab is-active" data-wx="now" type="button">현재</button>
                <button class="wx-tab" data-wx="hourly" type="button">시간별</button>
                <button class="wx-tab" data-wx="weekly" type="button">주간별</button>
              </div>
            </div>
            <div class="wx-body" id="wxBody"><!-- app.js: 활성 탭 렌더 --></div>
          </div>

          <!-- 공지 피드 (구글 시트 연동: 편집 버튼 → 비밀번호 → 작성/수정/삭제) -->
          <div class="widget feed">
            <div class="widget__head">
              <span class="widget__title">공지사항</span>
              <button class="widget__more" id="noticeEdit" type="button">
                <i data-lucide="pencil" style="width:13px;height:13px;vertical-align:-1px;"></i> 편집
              </button>
            </div>
            <ul class="feed__list" id="noticeFeed"><!-- app.js 주입 --></ul>
          </div>
        </section>

        <!-- [하단] 트윈 To-Do 중요 업무 전달사항 (메인 피드) -->
        <section class="todo-card has-coming-soon">
          <!-- 준비중 글라스 오버레이 -->
          <div class="coming-soon" aria-hidden="true">
            <span class="coming-soon__badge"><i data-lucide="hammer"></i> 준비 중입니다</span>
          </div>
          <div class="todo-card__head">
            <div class="todo-card__titlewrap">
              <i data-lucide="list-checks" class="todo-card__icon"></i>
              <h2 class="todo-card__title">Daily To-Do</h2>
            </div>
            <button class="todo-card__more" id="todoMore" type="button">
              전체보기 <i data-lucide="arrow-right"></i>
            </button>
          </div>
          <div class="todo-card__sub">
            <!-- 파트 필터 (커스텀 드롭다운) -->
            <div class="part-filter">
              <select class="part-filter__select" id="todoFilter"><!-- app.js 주입 --></select>
              <i data-lucide="chevron-down" class="part-filter__arrow"></i>
            </div>
            <span class="todo-card__badge" id="todoBadge">미결 0</span>
          </div>
          <ul class="todo-list" id="todoList"><!-- app.js 주입 --></ul>
        </section>

        <!-- [하단] 컴팩트 서비스 바로가기 -->
        <section class="shortcut-section">
          <div class="section-head"><h2 class="section-head__title">전체 서비스</h2></div>
          <div class="shortcut-grid" id="shortcutGrid"><!-- app.js 주입 --></div>
        </section>

      </div><!-- /#homePage -->

      <!-- 서브페이지(iframe/브릿지) 컨테이너 -->
      <div class="page page--hidden" id="viewPage"></div>

    </main>

    <!-- ============ C. 모바일 하단 탭바 ============ -->
    <nav class="bottom-nav" id="bottomNav" aria-label="하단 메뉴">
      <button class="bottom-nav__item is-active" data-nav="home" type="button">
        <i data-lucide="home"></i><span class="bottom-nav__label">홈</span>
      </button>
      <button class="bottom-nav__item" data-nav="chatbot" type="button">
        <i data-lucide="bot"></i><span class="bottom-nav__label">챗봇</span>
      </button>
      <button class="bottom-nav__item" data-nav="manual" type="button">
        <i data-lucide="book-open"></i><span class="bottom-nav__label">매뉴얼</span>
      </button>
      <button class="bottom-nav__item" data-nav="menu" type="button">
        <i data-lucide="layout-grid"></i><span class="bottom-nav__label">전체</span>
      </button>
    </nav>

  </div><!-- /.app-shell -->

  <!-- D. 오버레이(전체메뉴/모달/토스트) 루트 -->
  <div class="overlay-root" id="overlayRoot"></div>

  <!-- 스크립트 (config → app) — defer 로 HTML 파싱을 막지 않음(실행 순서는 유지됨) -->
  <script src="config.js" defer></script>
  <script src="assets/js/app.js" defer></script>

  <script>
    /* ───────────────────────────────────────────────
       개발 모드: 서비스워커 OFF (캐시 때문에 수정사항이 안 보이는 문제 방지)
       - 로컬(localhost/127.0.0.1/file://)에서는 자동으로 개발 모드 → SW 해제·캐시 비움.
       - 실제 배포 도메인에서는 자동으로 운영 모드 → SW 등록(PWA 설치/오프라인 캐시).
       - 강제로 끄고/켜고 싶으면 아래 값을 true/false 로 직접 지정하세요.
    ─────────────────────────────────────────────── */
    var DEV_MODE = ["localhost", "127.0.0.1", ""].indexOf(location.hostname) !== -1;

    if ("serviceWorker" in navigator) {
      if (DEV_MODE) {
        // 등록된 SW 전부 해제 (푸시 수신용 FCM 워커는 유지 — 지우면 구독이 끊김)
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            var u = (r.active && r.active.scriptURL) || "";
            if (u.indexOf("firebase-messaging-sw") !== -1) return;
            r.unregister();
          });
        });
        // 캐시 스토리지 비우기
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      } else {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("sw.js").catch(function (e) {
            console.log("ServiceWorker 등록 보류:", e);
          });
        });
      }
    }
  </script>
</body>
</html>
