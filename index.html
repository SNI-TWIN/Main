<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="사내 포털">
  <meta name="application-name" content="사내 포털">
  <meta name="theme-color" content="#A50034">
  <title>사내 통합 포털</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      /* [FIX 5] 300ms 탭 지연 제거 (Android Chrome) */
      touch-action: manipulation;
    }
    :root {
      --red:        #A50034;
      --red-dark:   #7D0027;
      --red-alpha:  rgba(165,0,52,0.08);
      --dark:       #1A1A1A;
      --mid:        #555;
      --light:      #999;
      --bg:         #F2F2F2;
      --white:      #FFFFFF;
      --border:     #E5E5E5;
      --sh-sm:      0 1px 4px rgba(0,0,0,0.07);
      --sh-md:      0 2px 10px rgba(0,0,0,0.10);
      --r:          12px;
      --hdr:        56px;
      --tab:        64px;
      --sab:        env(safe-area-inset-bottom, 0px);
      /* [FIX 1] iOS 노치/Dynamic Island 상단 안전 영역 */
      --sat:        env(safe-area-inset-top, 0px);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--dark);
    }

    /* ── HEADER ─────────────────────────────── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0;
      /* [FIX 1] 높이 = 기본 56px + 상단 안전 영역(노치/Dynamic Island) */
      height: calc(var(--hdr) + var(--sat));
      padding-top: var(--sat);
      background: var(--red);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 18px; padding-right: 14px;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .hdr-brand { display: flex; flex-direction: column; gap: 1px; }
    .hdr-name  { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .hdr-sub   { font-size: 10px; color: rgba(255,255,255,0.62); font-weight: 400; }
    .hdr-btn {
      width: 44px; height: 44px; display: flex;
      align-items: center; justify-content: center;
      border-radius: 10px; border: none;
      background: rgba(255,255,255,0.15);
      color: #fff; cursor: pointer;
    }
    .hdr-btn:active { background: rgba(255,255,255,0.28); }

    /* ── BANNER ──────────────────────────────── */
    .bnr {
      position: fixed;
      /* [FIX 1] 헤더 아래(노치 포함 높이) 바로 붙임 */
      top: calc(var(--hdr) + var(--sat));
      left: 0; right: 0;
      z-index: 190;
      transition: opacity .28s ease, visibility .28s ease;
      overflow: hidden;
    }
    .bnr-inner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px 10px 16px;
      min-height: var(--bnr);
      border-bottom: 2px solid transparent;
    }
    .bnr.urgent .bnr-inner { background: #FFF0F0; border-color: #FF3B30; }
    .bnr.warn   .bnr-inner { background: #FFFBEB; border-color: #FFCC00; }
    .bnr.info   .bnr-inner { background: #EFF6FF; border-color: #60A5FA; }
    .bnr-ico  { font-size: 20px; flex-shrink: 0; }
    .bnr-msg  { flex: 1; font-size: 13px; font-weight: 500; color: var(--dark); line-height: 1.45; }
    .bnr-cta  {
      min-width: 52px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--red);
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
    }
    .bnr-x {
      min-width: 36px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: var(--light);
      background: none; border: none; cursor: pointer; flex-shrink: 0;
    }
    /* [FIX 4] height 대신 visibility+opacity로 숨김 처리 → 높이 계산 JS로 위임 */
    .bnr.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    /* ── SCROLL AREA ─────────────────────────── */
    .wrap {
      position: fixed;
      /* [FIX 4] top은 JS adjustWrap()이 동적으로 계산해서 덮어씀 */
      top: calc(var(--hdr) + var(--sat) + 60px);
      left: 0; right: 0;
      bottom: calc(var(--tab) + var(--sab));
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      transition: top .18s ease;
    }

    /* ── TAB PANELS ──────────────────────────── */
    .panel      { display: none; padding: 16px 14px 24px; }
    .panel.on   { display: block; }

    /* ── SECTION HEADER ──────────────────────── */
    .sec {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 12px; margin-top: 2px;
    }
    .sec-ttl {
      font-size: 14px; font-weight: 700; color: var(--dark);
      display: flex; align-items: center; gap: 8px;
    }
    .sec-ttl::before {
      content: ''; width: 3px; height: 15px;
      border-radius: 2px; background: var(--red); display: inline-block;
    }
    .divider { height: 1px; background: var(--border); margin: 20px 0 16px; }

    /* ── SERVICE CARDS GRID ──────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--white);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--sh-sm);
      padding: 20px 12px 16px;
      display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 7px;
      min-height: 110px;
      text-decoration: none; color: inherit;
      position: relative; overflow: hidden; cursor: pointer;
      transition: transform .12s, box-shadow .12s;
    }
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--red);
    }
    .card.alt::before { background: #666; }
    .card:active { transform: scale(0.96); box-shadow: 0 0 0 2px var(--red-alpha); }
    .card-ico  { font-size: 34px; line-height: 1; }
    .card-name { font-size: 14px; font-weight: 700; color: var(--dark); line-height: 1.3; }
    .card-desc { font-size: 11px; color: var(--light); line-height: 1.3; }

    /* ── CONTACTS ────────────────────────────── */
    .srch-wrap { position: relative; margin-bottom: 14px; }
    .srch-ico  {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 16px; pointer-events: none;
    }
    .srch-inp {
      width: 100%; height: 48px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--white);
      padding: 0 14px 0 42px;
      /* [FIX 2] 16px 미만이면 iOS Safari가 탭 시 화면 자동 확대됨 */
      font-size: 16px; font-family: inherit; color: var(--dark);
      outline: none; -webkit-appearance: none;
    }
    .srch-inp:focus { border-color: var(--red); }
    .crow {
      display: flex; align-items: center; gap: 14px;
      background: var(--white);
      border-radius: 12px; border: 1px solid var(--border);
      padding: 12px 14px; margin-bottom: 8px;
      text-decoration: none; color: inherit; min-height: 64px;
      box-shadow: var(--sh-sm);
    }
    .crow:active { background: #F8F8F8; }
    .avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--red); color: #fff;
      font-size: 17px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cinfo      { flex: 1; }
    .cname      { font-size: 15px; font-weight: 600; }
    .cdept      { font-size: 12px; color: var(--light); margin-top: 2px; }
    .ccall {
      width: 46px; height: 46px; border-radius: 50%;
      background: #F0FFF4;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; text-decoration: none;
    }

    /* ── NOTICE FEED ─────────────────────────── */
    .nrow {
      background: var(--white);
      border-radius: 12px; border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      padding: 14px 16px; margin-bottom: 10px;
      box-shadow: var(--sh-sm);
    }
    .nrow.warn { border-left-color: #F59E0B; }
    .nrow.info { border-left-color: #3B82F6; }
    .nrow-ttl  { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .nrow-body { font-size: 12px; color: var(--mid); line-height: 1.55; }
    .nrow-foot {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 10px;
    }
    .ndate     { font-size: 11px; color: var(--light); }
    .badge     {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      background: #FFE8EE; color: var(--red);
    }
    .badge.warn { background: #FEF3C7; color: #92400E; }
    .badge.info { background: #DBEAFE; color: #1D4ED8; }

    /* ── BOTTOM TAB BAR ──────────────────────── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--tab) + var(--sab));
      padding-bottom: var(--sab);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch;
      z-index: 200;
      box-shadow: 0 -2px 14px rgba(0,0,0,0.07);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; color: var(--light);
      background: none; border: none; font-family: inherit;
      transition: color .15s; padding-top: 6px;
      position: relative;
    }
    .tab.on { color: var(--red); }
    .tab.on::after {
      content: ''; position: absolute;
      top: 0; left: 22%; right: 22%; height: 2px;
      background: var(--red); border-radius: 0 0 2px 2px;
    }
    .tab-ico { font-size: 23px; line-height: 1; }
    .tab-lbl { font-size: 10px; font-weight: 600; }
    .tbadge {
      position: absolute; top: 5px; right: calc(50% - 20px);
      min-width: 16px; height: 16px; border-radius: 8px;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    /* ── BOTTOM SHEET ────────────────────────── */
    .overlay {
      display: none; position: fixed;
      /* [FIX 3] inset: 0 → iOS 14.1 미만 미지원, 명시적으로 분리 */
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45); z-index: 300;
      align-items: flex-end;
    }
    .overlay.on { display: flex; }
    .sheet {
      width: 100%; background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 0 16px calc(24px + var(--sab));
      max-height: 88vh; overflow-y: auto;
    }
    .sh-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 14px auto 20px;
    }
    .sh-title  { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
    .info-box  {
      background: #EFF6FF; border: 1px solid #BAE6FD;
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: #0369A1; line-height: 1.5;
      margin-bottom: 18px;
    }
    .fl { margin-bottom: 14px; }
    .fl label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--mid); margin-bottom: 6px;
    }
    .fi {
      width: 100%; height: 48px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: #F9F9F9; padding: 0 14px;
      /* [FIX 2] iOS 자동 확대 방지 */
      font-size: 16px; font-family: inherit; color: var(--dark);
      outline: none; -webkit-appearance: none;
    }
    textarea.fi { height: 78px; padding: 12px 14px; resize: none; line-height: 1.5; }
    .fi:focus   { border-color: var(--red); background: #fff; }
    .btn-main {
      width: 100%; height: 54px; background: var(--red);
      color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 4px;
    }
    .btn-main:active { background: var(--red-dark); }
    .btn-ghost {
      width: 100%; height: 48px; background: #F2F2F2;
      color: var(--mid); border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-name" id="appName">사내 통합 포털</span>
    <span class="hdr-sub">Company Hub</span>
  </div>
  <button class="hdr-btn" id="settingsBtn" aria-label="설정">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
               a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
               A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
               l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
               A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
               l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
               a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
               l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
               a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- NOTICE BANNER -->
<div class="bnr urgent" id="bnr">
  <div class="bnr-inner">
    <span class="bnr-ico" id="bnrIco">🚨</span>
    <div class="bnr-msg" id="bnrMsg">[긴급] 오늘 오전 10시 안전교육 필수 참석 — 2층 대회의실</div>
    <a class="bnr-cta" id="bnrCta" href="#" target="_blank" rel="noopener">확인 →</a>
    <button class="bnr-x" id="bnrX" aria-label="닫기">✕</button>
  </div>
</div>

<!-- SCROLL AREA -->
<div class="wrap" id="wrap">

  <!-- HOME -->
  <div class="panel on" id="panel-home">
    <div class="sec"><span class="sec-ttl">업무 도구</span></div>
    <div class="grid" id="grid-svc"></div>
    <div class="divider"></div>
    <div class="sec"><span class="sec-ttl">빠른 실행</span></div>
    <div class="grid" id="grid-quick"></div>
  </div>

  <!-- CONTACTS -->
  <div class="panel" id="panel-contacts">
    <div class="srch-wrap">
      <span class="srch-ico">🔍</span>
      <input type="search" class="srch-inp" id="srch" placeholder="이름 또는 부서 검색" autocomplete="off">
    </div>
    <div id="clist"></div>
  </div>

  <!-- NOTICES -->
  <div class="panel" id="panel-notices">
    <div id="nlist"></div>
  </div>

</div>

<!-- TAB BAR -->
<nav class="tabbar">
  <button class="tab on" id="tab-home"     onclick="goTab('home')">
    <span class="tab-ico">🏠</span>
    <span class="tab-lbl">홈</span>
  </button>
  <button class="tab"    id="tab-contacts" onclick="goTab('contacts')">
    <span class="tab-ico">👥</span>
    <span class="tab-lbl">연락망</span>
  </button>
  <button class="tab"    id="tab-notices"  onclick="goTab('notices')">
    <span class="tab-ico">🔔</span>
    <span class="tab-lbl">공지</span>
    <span class="tbadge" id="tbadge"></span>
  </button>
</nav>

<!-- SETTINGS SHEET -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">⚙️ 관리자 설정</div>
    <div class="info-box">
      💡 서비스 링크·연락처는 파일 상단 <strong>CONFIG</strong> 영역에서 직접 수정하세요.
      여기서는 <strong>긴급 공지 배너</strong>만 실시간 편집 가능합니다.
    </div>
    <div class="sec" style="margin-top:0"><span class="sec-ttl">공지 배너 편집</span></div>
    <div class="fl">
      <label>공지 메시지</label>
      <textarea class="fi" id="eMsg" placeholder="전 직원에게 전달할 내용을 입력하세요"></textarea>
    </div>
    <div class="fl">
      <label>링크 URL (없으면 빈칸)</label>
      <input type="url" class="fi" id="eUrl" placeholder="https://forms.google.com/...">
    </div>
    <div class="fl">
      <label>배너 색상</label>
      <select class="fi" id="eType" style="-webkit-appearance:none;appearance:none;background:#F9F9F9">
        <option value="urgent">🚨 긴급 (빨간색)</option>
        <option value="warn">⚠️ 주의 (노란색)</option>
        <option value="info">ℹ️ 안내 (파란색)</option>
      </select>
    </div>
    <button class="btn-main"  onclick="saveNotice()">저장 및 적용</button>
    <button class="btn-ghost" onclick="closeSheet()">취소</button>
  </div>
</div>

<script>
/* ================================================================
   ✏️  CONFIG — 여기서 앱 내용을 자유롭게 수정하세요
   ================================================================ */
const CONFIG = {

     type: 'urgent'(빨강) | 'warn'(노랑) | 'info'(파랑)         */

    text: '[긴급] 오늘 오전 10시 안전교육 필수 참석 — 2층 대회의실',
    url:  '',
    type: 'urgent',
  },

  /* 업무 도구 카드 — ico: 이모지, url: 이동할 주소               */

    { ico:'📋', name:'AppSheet',    desc:'현장 작업 앱',      url:'https://www.appsheet.com/' },
    { ico:'🌐', name:'팀 사이트',   desc:'구글 사이트 도구',  url:'https://sites.google.com/' },

    { ico:'📁', name:'드라이브',    desc:'공유 문서함',        url:'https://drive.google.com/' },
    { ico:'💬', name:'팀 채팅',     desc:'팀 메신저',          url:'https://chat.google.com/' },
    { ico:'📊', name:'현황 판',     desc:'실시간 대시보드',    url:'#' },
    { ico:'🔧', name:'업무 시스템', desc:'사내 ERP / HR',      url:'#' },
  ],

  /* 빠른 실행 링크                                                */
  quickLinks: [
    { ico:'🆘', name:'비상 매뉴얼', desc:'긴급 상황 프로세스', url:'#' },
    { ico:'📞', name:'비상 연락처', desc:'핵심 연락처 모음',   url:'#' },
    { ico:'📷', name:'사진 제출',   desc:'현장 사진 업로드',   url:'#' },
    { ico:'✅', name:'점검 체크',   desc:'일일 점검표 작성',   url:'#' },
  ],

  /* 연락망 — initials: 아바타에 표시할 한 글자                   */

    { name:'김현장', dept:'현장관리팀 · 팀장',  tel:'tel:010-0000-0001', initials:'김' },
    { name:'이안전', dept:'안전보건팀 · 담당',  tel:'tel:010-0000-0002', initials:'이' },
    { name:'박시설', dept:'시설관리팀 · 주임',  tel:'tel:010-0000-0003', initials:'박' },
    { name:'최총무', dept:'총무팀 · 담당',      tel:'tel:010-0000-0004', initials:'최' },
    { name:'정인사', dept:'인사팀 · 주임',      tel:'tel:010-0000-0005', initials:'정' },
    { name:'강IT',   dept:'IT지원팀 · 담당',    tel:'tel:010-0000-0006', initials:'강' },
  ],

  /* 공지사항 — type: 'urgent'|'warn'|'info'|''                   */
  notices: [
    {
      title:'[필독] 5월 안전교육 일정 안내',
      body: '5월 29일(목) 오전 10시, 2층 대회의실. 전 직원 필수 참석.',
      date: '2026-05-29', type:'urgent', badge:'긴급', url:'',
    },
    {
      title:'6월 연차 신청 마감 안내',
      body: '6월 연차는 5월 31일까지 구글 폼으로 제출해 주세요. 기한 초과 시 자동 반려.',
      date: '2026-05-28', type:'warn', badge:'안내', url:'',
    },
    {
      title:'사무용품 신청 취합 중',
      body: '필요 물품은 구글 폼에 5월 30일까지 입력해주세요.',
      date: '2026-05-27', type:'', badge:'', url:'',
    },
    {
      title:'그룹웨어 점검 예고 (5/31 00:00~06:00)',
      body: '새벽 6시간 그룹웨어 정기 점검. 해당 시간 이용 불가.',
      date: '2026-05-26', type:'info', badge:'공지', url:'',
    },
  ],
};
/* ================================================================
   여기까지가 편집 영역입니다
   ================================================================ */

const ICO = { urgent:'🚨', warn:'⚠️', info:'ℹ️' };
let live = JSON.parse(localStorage.getItem('liveNotice')) || null;
const D  = { ...CONFIG, notice: live || CONFIG.notice };

/* ── [FIX 4] 배너 실제 높이로 스크롤 영역 top 동적 계산 ── */
function adjustWrap() {
  const bnr  = document.getElementById('bnr');
  const wrap = document.getElementById('wrap');
  const hdr  = document.querySelector('.hdr');
  const hdrH = hdr.getBoundingClientRect().height;
  if (bnr.classList.contains('gone')) {
    wrap.style.top = hdrH + 'px';
  } else {
    wrap.style.top = (hdrH + bnr.getBoundingClientRect().height) + 'px';
  }
}

/* ── [FIX 6] Android Chrome PWA 매니페스트 주입 ────────── */
function injectManifest() {
  const m = {
    name: CONFIG.appName,
    short_name: '사내 포털',
    start_url: './',
    display: 'standalone',
    background_color: '#A50034',
    theme_color: '#A50034',
    orientation: 'portrait-primary',
    lang: 'ko',
  };
  const blob = new Blob([JSON.stringify(m)], { type: 'application/manifest+json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

/* ── init ─────────────────────────────────────────── */
function init() {
  document.getElementById('appName').textContent = CONFIG.appName;
  document.title = CONFIG.appName;

  injectManifest();
  applyBanner();
  renderGrid('grid-svc',   D.services,   false);
  renderGrid('grid-quick', D.quickLinks, true);
  renderContacts();
  renderNotices();
  updateBadge();

  document.getElementById('settingsBtn').addEventListener('click', openSheet);
  document.getElementById('bnrX').addEventListener('click', hideBanner);
  document.getElementById('srch').addEventListener('input', e => renderContacts(e.target.value));

  /* 배너 높이 초기 계산 + 폰트/이미지 로드 후 재계산 */
  adjustWrap();
  window.addEventListener('resize', adjustWrap);
  window.addEventListener('load',   adjustWrap);

  /* [iOS 키보드] 입력 포커스 시 탭바 숨김 → 키보드에 탭바가 가려지는 현상 방지 */
  const tabbar = document.querySelector('.tabbar');
  document.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('focus', () => { tabbar.style.opacity = '0'; tabbar.style.pointerEvents = 'none'; });
    el.addEventListener('blur',  () => { tabbar.style.opacity = '';  tabbar.style.pointerEvents = ''; });
  });
}

/* ── banner ───────────────────────────────────────── */
function applyBanner() {
  const n = D.notice;
  const el = document.getElementById('bnr');
  document.getElementById('bnrMsg').textContent = n.text;
  document.getElementById('bnrIco').textContent = ICO[n.type] || '📢';
  const cta = document.getElementById('bnrCta');
  cta.style.display = n.url ? '' : 'none';
  if (n.url) cta.href = n.url;
  el.className = 'bnr ' + (n.type || 'info');
  if (sessionStorage.getItem('bnrGone') === '1') {
    el.classList.add('gone');
  }
}

function hideBanner() {
  document.getElementById('bnr').classList.add('gone');
  sessionStorage.setItem('bnrGone', '1');
  /* [FIX 4] 배너 숨김 후 transition 완료 시점에 재계산 */
  setTimeout(adjustWrap, 300);
}

/* ── grids ────────────────────────────────────────── */
function renderGrid(id, items, alt) {
  document.getElementById(id).innerHTML = items.map(s =>
    `<a class="card${alt?' alt':''}" href="${s.url}" target="_blank" rel="noopener noreferrer">
      <span class="card-ico">${s.ico}</span>
      <span class="card-name">${s.name}</span>
      <span class="card-desc">${s.desc}</span>
    </a>`
  ).join('');
}

/* ── contacts ─────────────────────────────────────── */
function renderContacts(q = '') {
  const f = q.trim();
  const rows = f
    ? D.contacts.filter(c => c.name.includes(f) || c.dept.includes(f))
    : D.contacts;
  document.getElementById('clist').innerHTML = rows.length
    ? rows.map(c =>
        `<a class="crow" href="${c.tel}">
          <div class="avatar">${c.initials}</div>
          <div class="cinfo">
            <div class="cname">${c.name}</div>
            <div class="cdept">${c.dept}</div>
          </div>
          <div class="ccall">📞</div>
        </a>`
      ).join('')
    : '<p style="text-align:center;color:#aaa;padding:40px 0;font-size:14px">검색 결과 없음</p>';
}

/* ── notices ──────────────────────────────────────── */
function renderNotices() {
  document.getElementById('nlist').innerHTML = D.notices.map(n =>
    `<div class="nrow ${n.type||''}" ${n.url?`onclick="window.open('${n.url}','_blank','noopener')"`:''}>
      <div class="nrow-ttl">${n.title}</div>
      <div class="nrow-body">${n.body}</div>
      <div class="nrow-foot">
        <span class="ndate">${n.date}</span>
        ${n.badge?`<span class="badge ${n.type||''}">${n.badge}</span>`:''}
      </div>
    </div>`
  ).join('');
}

function updateBadge() {
  const count = D.notices.filter(n => n.type === 'urgent' || n.type === 'warn').length;
  const el = document.getElementById('tbadge');
  el.textContent = count || '';
  el.style.display = count ? '' : 'none';
}

/* ── tab switching ────────────────────────────────── */
function goTab(name) {
  ['home','contacts','notices'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('on', t===name);
    document.getElementById('tab-'+t).classList.toggle('on', t===name);
  });
  document.getElementById('wrap').scrollTop = 0;
}

/* ── settings sheet ───────────────────────────────── */
function openSheet() {
  document.getElementById('eMsg').value  = D.notice.text;
  document.getElementById('eUrl').value  = D.notice.url;
  document.getElementById('eType').value = D.notice.type;
  document.getElementById('overlay').classList.add('on');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('on');
}

function saveNotice() {
  const updated = {
    text: document.getElementById('eMsg').value.trim()  || D.notice.text,
    url:  document.getElementById('eUrl').value.trim(),
    type: document.getElementById('eType').value,
  };
  D.notice = updated;
  localStorage.setItem('liveNotice', JSON.stringify(updated));
  sessionStorage.removeItem('bnrGone');
  document.getElementById('bnr').classList.remove('gone');
  applyBanner();
  /* [FIX 4] 배너 복원 후 레이아웃 재계산 */
  setTimeout(adjustWrap, 50);
  closeSheet();
}

init();
</script>
</body>
</html>
